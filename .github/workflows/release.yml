name: Build and release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: JVM tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM tests
        run: ./gradlew :core:test :shared:test :server:test

  android-debug:
    name: Android debug APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APKs
        run: ./gradlew :android:assembleDebug :imc-cret:assembleDebug

      - name: Collect APKs
        run: |
          VERSION="$(grep '^projectVersion=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          mkdir -p artifacts
          cp android/build/outputs/apk/debug/android-debug.apk "artifacts/ELIXIR-REIGN-${VERSION}-android-debug.apk"
          cp imc-cret/build/outputs/apk/debug/imc-cret-debug.apk "artifacts/IMC-CRET-${VERSION}-imc-cret-debug.apk"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apks
          path: artifacts/*
          if-no-files-found: error

  desktop-jars:
    name: Desktop JARs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build desktop JARs
        run: ./gradlew :lwjgl3:jarLinux :lwjgl3:jarWin

      - name: Collect desktop JARs
        run: |
          VERSION="$(grep '^projectVersion=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          mkdir -p artifacts
          cp "lwjgl3/build/libs/ELIXIR-REIGN-${VERSION}-linux.jar" "artifacts/ELIXIR-REIGN-${VERSION}-pc-linux.jar"
          cp "lwjgl3/build/libs/ELIXIR-REIGN-${VERSION}-win.jar" "artifacts/ELIXIR-REIGN-${VERSION}-pc-win.jar"

      - name: Upload desktop JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-jars
          path: artifacts/*
          if-no-files-found: error

  macos-arm-dmg:
    name: macOS ARM DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build macOS ARM package
        run: ./gradlew :lwjgl3:packageMacM1

      - name: Create macOS ARM DMG
        run: |
          VERSION="$(grep '^projectVersion=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          DIST_DIR="lwjgl3/build/construo/dist"
          WORK_DIR="$(mktemp -d)"
          UNPACK_DIR="${WORK_DIR}/unpack"
          STAGE_DIR="${WORK_DIR}/stage"
          DMG_PATH="artifacts/ELIXIR-REIGN-${VERSION}-mac-arm64.dmg"

          mkdir -p "$UNPACK_DIR" "$STAGE_DIR" artifacts
          unzip -q "${DIST_DIR}/ELIXIR-REIGN-macM1.zip" -d "$UNPACK_DIR"

          APP_PATH="$(find "$UNPACK_DIR" -maxdepth 2 -type d -name '*.app' | head -n 1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "No .app bundle found in ${DIST_DIR}/ELIXIR-REIGN-macM1.zip"
            exit 1
          fi

          cp -R "$APP_PATH" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"

          hdiutil create \
            -volname "ELIXIR-REIGN" \
            -srcfolder "$STAGE_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

      - name: Upload macOS ARM DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-dmg
          path: artifacts/*
          if-no-files-found: error

  server-jar:
    name: Server JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build server JAR
        run: ./gradlew :server:jar

      - name: Collect server JAR
        run: |
          VERSION="$(grep '^projectVersion=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          mkdir -p artifacts
          cp "server/build/libs/ELIXIR-REIGN-${VERSION}-serv.jar" "artifacts/ELIXIR-REIGN-${VERSION}-serv.jar"

      - name: Upload server JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: artifacts/*
          if-no-files-found: error

  release:
    name: GitHub release
    needs:
      - checks
      - android-debug
      - desktop-jars
      - macos-arm-dmg
      - server-jar
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          VERSION="$(grep '^projectVersion=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          TAG="${GITHUB_REF_NAME}"
          if [ "$TAG" != "v${VERSION}" ]; then
            echo "Tag ${TAG} does not match gradle.properties projectVersion=${VERSION}."
            exit 1
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
